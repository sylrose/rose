p.rss-title {

    line-height:1.1;
    font-family: Georgia, 'Times New Roman', Times, serif;
    outline: 1px solid;
      outline-offset: 5px; /* Pushes the outline 5px away from the element */
      padding: 4px;
margin-left: 15px;
margin-right: 15px;

}

/* this styles the blog title link */
li.rss-item a {
    font-weight:bold;
    text-decoration:none; /* removes underline */
}

/* this styles the date */
.rss-date {
    display:inline-block; /* need this to add padding around each number */

    padding-bottom:10px;
    font-style:italic;
}
/* hides the weird # of comments (displayed as 0 in demo) */
a.rss-item:last-child {
    display:none;
}
a.rss-item:first-child {
    font-size:  20px;
}


</style>
